<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 500" font-family="Segoe UI, Arial, sans-serif">
  <!-- heller Hintergrund, damit es auch im GitHub-Darkmode lesbar ist -->
  <rect x="0" y="0" width="760" height="500" rx="12" fill="#f4f6f9" stroke="#d0d7e2"/>

  <text x="380" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1b2a4a">Verkabelung NodeMCU ESP8266 &#8596; MAX485 (RS-485)</text>
  <text x="380" y="58" text-anchor="middle" font-size="12" fill="#5a6b85">schematisch &#8211; RE getrennt von DE auf D2 (f&#252;r den RS485-Selbsttest)</text>

  <!-- NodeMCU -->
  <rect x="70" y="90" width="190" height="300" rx="10" fill="#2b3a55" stroke="#16223a" stroke-width="2"/>
  <text x="165" y="116" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">NodeMCU ESP8266</text>

  <!-- MAX485 -->
  <rect x="500" y="120" width="180" height="240" rx="10" fill="#15497a" stroke="#0c2c4d" stroke-width="2"/>
  <text x="590" y="146" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">MAX485</text>
  <text x="590" y="164" text-anchor="middle" font-size="11" fill="#bcd4ec">TTL &#8596; RS-485</text>

  <!-- Pin-Labels NodeMCU (innen, rechtsbuendig) -->
  <text x="250" y="165" text-anchor="end" font-size="13" fill="#dfe7f3">D1</text>
  <text x="250" y="200" text-anchor="end" font-size="13" fill="#dfe7f3">D2</text>
  <text x="250" y="235" text-anchor="end" font-size="13" fill="#dfe7f3">D3</text>
  <text x="250" y="270" text-anchor="end" font-size="13" fill="#dfe7f3">D4</text>
  <text x="250" y="315" text-anchor="end" font-size="13" fill="#dfe7f3">3V3</text>
  <text x="250" y="350" text-anchor="end" font-size="13" fill="#dfe7f3">GND</text>

  <!-- Pin-Labels MAX485 (innen, linksbuendig) -->
  <text x="510" y="165" font-size="13" fill="#dbe9f8">RO</text>
  <text x="510" y="200" font-size="13" fill="#dbe9f8">RE</text>
  <text x="510" y="235" font-size="13" fill="#dbe9f8">DE</text>
  <text x="510" y="270" font-size="13" fill="#dbe9f8">DI</text>
  <text x="510" y="315" font-size="13" fill="#dbe9f8">VCC</text>
  <text x="510" y="350" font-size="13" fill="#dbe9f8">GND</text>

  <!-- Verbindungen (NodeMCU x=260  ->  MAX485 x=500) -->
  <!-- D1 - RO -->
  <line x1="260" y1="160" x2="500" y2="160" stroke="#1565c0" stroke-width="3"/>
  <text x="380" y="153" text-anchor="middle" font-size="11" fill="#1565c0">RX</text>
  <!-- D2 - RE  (NEU) -->
  <line x1="260" y1="195" x2="500" y2="195" stroke="#e65100" stroke-width="5"/>
  <rect x="352" y="180" width="56" height="18" rx="9" fill="#e65100"/>
  <text x="380" y="193" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">RE &#8226; NEU</text>
  <!-- D3 - DE -->
  <line x1="260" y1="230" x2="500" y2="230" stroke="#2e7d32" stroke-width="3"/>
  <text x="380" y="223" text-anchor="middle" font-size="11" fill="#2e7d32">DE</text>
  <!-- D4 - DI -->
  <line x1="260" y1="265" x2="500" y2="265" stroke="#6a1b9a" stroke-width="3"/>
  <text x="380" y="258" text-anchor="middle" font-size="11" fill="#6a1b9a">TX</text>
  <!-- 3V3 - VCC -->
  <line x1="260" y1="310" x2="500" y2="310" stroke="#c62828" stroke-width="3"/>
  <text x="380" y="303" text-anchor="middle" font-size="11" fill="#c62828">3.3V</text>
  <!-- GND - GND -->
  <line x1="260" y1="345" x2="500" y2="345" stroke="#455a64" stroke-width="3"/>
  <text x="380" y="338" text-anchor="middle" font-size="11" fill="#455a64">GND</text>

  <!-- Pin-Punkte -->
  <g fill="#ffd24d" stroke="#16223a" stroke-width="1">
    <circle cx="260" cy="160" r="4"/><circle cx="260" cy="195" r="4"/><circle cx="260" cy="230" r="4"/>
    <circle cx="260" cy="265" r="4"/><circle cx="260" cy="310" r="4"/><circle cx="260" cy="345" r="4"/>
  </g>
  <g fill="#ffd24d" stroke="#0c2c4d" stroke-width="1">
    <circle cx="500" cy="160" r="4"/><circle cx="500" cy="195" r="4"/><circle cx="500" cy="230" r="4"/>
    <circle cx="500" cy="265" r="4"/><circle cx="500" cy="310" r="4"/><circle cx="500" cy="345" r="4"/>
  </g>

  <!-- RS-485 Bus zum SoyoSource -->
  <line x1="680" y1="230" x2="735" y2="230" stroke="#0c2c4d" stroke-width="3"/>
  <line x1="680" y1="265" x2="735" y2="265" stroke="#0c2c4d" stroke-width="3"/>
  <text x="690" y="223" font-size="11" fill="#0c2c4d">A</text>
  <text x="690" y="288" font-size="11" fill="#0c2c4d">B</text>
  <text x="708" y="200" text-anchor="middle" font-size="11" fill="#0c2c4d" transform="rotate(0)">&#8594; SoyoSource</text>

  <!-- Hinweis-Box -->
  <rect x="40" y="420" width="680" height="58" rx="8" fill="#fff3e0" stroke="#e65100"/>
  <text x="56" y="442" font-size="12" font-weight="bold" fill="#a8410a">&#9888; &#196;nderung gegen&#252;ber dem Original:</text>
  <text x="56" y="460" font-size="12" fill="#5a3a1a">DE/RE-Br&#252;cke auf dem MAX485-Modul auftrennen &#8211; RE separat an D2 (GPIO4). DE bleibt an D3.</text>
  <text x="56" y="474" font-size="12" fill="#5a3a1a">Versorgung: MAX485 VCC an 3.3V des NodeMCU. Ohne RE an D2 zeigt das Webinterface dauerhaft die RS485-Warnung.</text>
</svg>
